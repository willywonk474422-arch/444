# MPV Configuration for Anime with Anime4K
# Optimized for anti-aliasing and flicker-free playback

# Video Output & Rendering
vo=gpu-next
gpu-api=vulkan

# Anti-aliasing & Upscaling
scale=spline36
cscale=spline36
dscale=mitchell

# Anime4K Shaders
glsl-shaders="~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Deblur_CNN.glsl:~~/shaders/Anime4K_DarkLines_CNN.glsl:~~/shaders/Anime4K_ThinLines_CNN.glsl:~~/shaders/Anime4K_RessizeUpDownDeBlur.glsl"

# Flicker Prevention & Frame Timing
vsync=yes
interpolation=yes
tscale=oversample

# Static Line Flicker Removal
dither=no
temporal-dither=no
deband=no
tone-mapping=hdr
gpu-dither-depth=auto
gamma=1.0
contrast=1.0
brightness=0
saturation=1.0
hue=0
target-lut-size=256
compute-shader-test=no
gpu-wdisable=no
fbo-format=auto

# Playback Settings
hwdec=auto
video-sync=display-resample

# Color & Quality
sigmoid-upscaling=yes
linear-downscaling=yes
correct-downscaling=yes

# UI & Behavior
osc=yes
sub-auto=fuzzy
