# MPV Configuration for Anime with Anime4K
# Optimized for anti-aliasing and flicker-free playback

# Video Output & Rendering
vo=gpu-next
gpu-api=vulkan

# Anti-aliasing & Upscaling
scale=ewa_lanczos4
cscale=ewa_lanczos4
dscale=mitchell

# Anime4K Shaders
glsl-shaders="~~/shaders/Anime4K_Upscale_CNN_x2_M.glsl:~~/shaders/Anime4K_AutoDownscalePre_x4.glsl:~~/shaders/Anime4K_Deblur_CNN.glsl:~~/shaders/Anime4K_DarkLines_CNN.glsl:~~/shaders/Anime4K_ThinLines_CNN.glsl:~~/shaders/Anime4K_RessizeUpDownDeBlur.glsl"
